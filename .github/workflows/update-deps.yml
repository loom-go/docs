name: Update Docs Dependencies

on:
  repository_dispatch:
    types: [update-docs]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.DOCS_TRIGGER_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install Hugo
        run: |
          wget https://github.com/gohugoio/hugo/releases/download/v0.145.0/hugo_extended_0.145.0_linux-amd64.deb
          sudo dpkg -i hugo_extended_0.145.0_linux-amd64.deb

      - name: Update Hugo modules
        run: hugo mod get -u github.com/loom-go/loom github.com/loom-go/term github.com/loom-go/web

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add go.mod go.sum
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update docs dependencies"
          git push
