baseURL: https://loomui.dev
languageCode: en-us
title: loom
module:
  imports:
    - path: github.com/imfing/hextra
    - path: github.com/loom-go/loom
      mounts:
        - source: docs
          target: content/docs
    - path: github.com/loom-go/term
      mounts:
        - source: docs
          target: content/term
    - path: github.com/loom-go/web
      mounts:
        - source: docs
          target: content/web

outputs:
  home: [html, llms]

params:
  description: The reactive component framework for Go.
  search:
    enable: false
  navbar:
    displayLogo: false
    title: 「#」 loom
  footer:
    displayPoweredBy: false
    displayCopyright: true
  theme:
    displayToggle: false

cascade:
  next: false
  prev: false
  breadcrumbs: false

markup:
  goldmark:
    renderer:
      unsafe: true

menu:
  main:
    - name: DOCS
      pageRef: /docs
      weight: 1
    - name: TERM
      pageRef: /term
      weight: 2
    - name: WEB
      pageRef: /web
      weight: 3
    - name: BLOG
      pageRef: /blog
      weight: 4
    - name: "|"
      identifier: "spacer-1"
      weight: 5
    - name: "GITHUB"
      weight: 6
      url: "https://github.com/loom-go/loom"
    - name: "|"
      identifier: "spacer-2"
      weight: 7
    - name: "THEME"
      weight: 8
      params:
        type: theme-toggle
        label: false
